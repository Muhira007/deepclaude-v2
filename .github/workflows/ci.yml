name: CI

on:
  push:
    branches: [main]
    paths:
      - 'deepclaude'
      - 'deepclaude.ps1'
      - 'install.sh'
      - 'install.ps1'
      - 'tests/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]

jobs:
  # --- ShellCheck (Bash scripts) ---------------------------------------------
  lint-bash:
    name: ShellCheck (Bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
          additional_files: 'deepclaude install.sh'

  # --- PowerShell Script Analyzer --------------------------------------------
  lint-powershell:
    name: PSScriptAnalyzer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          Invoke-ScriptAnalyzer -Path deepclaude.ps1,install.ps1 -Recurse

  # --- BATS tests (Bash) ------------------------------------------------------
  test-bash:
    name: Tests (Bash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install BATS
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats
      - name: Run tests
        run: bats tests/

  # --- Pester tests (PowerShell) ----------------------------------------------
  test-powershell:
    name: Tests (PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Pester tests
        shell: pwsh
        run: |
          Install-Module -Name Pester -Force -Scope CurrentUser
          Invoke-Pester -Path tests/ -Output Detailed

  # --- Dry-run smoke tests ---------------------------------------------------
  smoke:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smoke: --help
        run: bash deepclaude --help
      - name: Smoke: --version
        run: bash deepclaude --version
      - name: Smoke: --dry-run (no key set)
        run: bash deepclaude --dry-run --verbose
